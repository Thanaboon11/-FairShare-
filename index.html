<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FairShare - แอปหารค่าใช้จ่าย</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FairShare">
    <meta name="theme-color" content="#F9F6F1">
    
    <!-- Manifest (Inlined for standalone file) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZhaXJTaGFyZSIsCiAgInNob3J0X25hbWUiOiAiRmFpclNoYXJlIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNGOEY2RjEiLAogICJ0aGVtZV9jb2xvciI6ICIjRjlGNkYxIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9wbGFjZWhvbGRlci5qcC81MTJ4NTEyLnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Anuphan', sans-serif;
            background-color: #F9F6F1;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .gradient-accent {
            background: linear-gradient(135deg, #64D2B7 0%, #4A90E2 100%);
        }

        .custom-shadow {
            box-shadow: 0 10px 30px -5px rgba(93, 84, 75, 0.1);
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .item-row {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-32">
    <div id="app" class="max-w-md mx-auto px-5 pt-10">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center overflow-hidden">
                    <!-- ใช้รูปที่ผู้ใช้อัปโหลดมาเป็นไอคอนในหน้าแอป -->
                    <img src="https://api.screenshotmachine.com/?key=ca7997&url=https%3A%2F%2Fexample.com&dimension=1024x1024&device=desktop&format=png" id="appIcon" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl font-bold text-[#5D544B] leading-none">FairShare</h1>
                    <span class="text-[10px] font-bold text-[#A69680] uppercase tracking-[0.2em]">PWA Edition</span>
                </div>
            </div>
            <button onclick="resetApp()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-red-300 hover:text-red-500 shadow-sm transition-colors">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
        </div>

        <!-- Result Card -->
        <div class="bg-white p-8 rounded-[3rem] custom-shadow border border-white mb-8 text-center relative overflow-hidden group">
            <div class="absolute -top-10 -right-10 w-32 h-32 gradient-accent opacity-10 rounded-full"></div>
            
            <p class="text-[#A69680] text-xs font-bold uppercase tracking-widest mb-2">จ่ายคนละ</p>
            <div class="flex justify-center items-baseline gap-1 mb-4">
                <span class="text-2xl font-semibold text-[#4A90E2]">฿</span>
                <h2 id="perPersonDisplay" class="text-6xl font-black text-[#5D544B] tracking-tighter transition-all">0</h2>
                <span id="decimalDisplay" class="text-2xl font-bold text-[#A69680] opacity-40">.00</span>
            </div>
            
            <div class="inline-flex items-center gap-3 px-5 py-2.5 bg-[#F9F6F1] rounded-full border border-[#F2EDE4]">
                <div class="flex flex-col items-start border-r border-[#E8DCC4] pr-4">
                    <span class="text-[9px] font-bold text-[#A69680] uppercase">ยอดรวมทั้งหมด</span>
                    <span id="totalDisplay" class="text-sm font-bold text-[#5D544B]">฿0</span>
                </div>
                <div class="flex flex-col items-start pl-1">
                    <span class="text-[9px] font-bold text-[#A69680] uppercase">จำนวนคน</span>
                    <span id="peopleDisplay" class="text-sm font-bold text-[#5D544B]">2 คน</span>
                </div>
            </div>
        </div>

        <!-- Add Item Form -->
        <div class="bg-white/80 backdrop-blur-md p-6 rounded-[2.5rem] border border-white custom-shadow mb-8">
            <div class="flex gap-3 mb-3">
                <div class="flex-[2]">
                    <label class="text-[10px] font-bold text-[#A69680] uppercase ml-2 mb-1 block">ชื่อรายการ</label>
                    <input type="text" id="itemName" placeholder="เช่น ค่าข้าว" 
                        class="w-full bg-[#F9F6F1] border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#64D2B7]/20 transition-all outline-none">
                </div>
                <div class="flex-[1]">
                    <label class="text-[10px] font-bold text-[#A69680] uppercase ml-2 mb-1 block">ราคา</label>
                    <input type="number" id="itemPrice" placeholder="0" 
                        class="w-full bg-[#F9F6F1] border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#64D2B7]/20 transition-all outline-none">
                </div>
            </div>
            <button onclick="addItem()" class="w-full gradient-accent text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-200 active:scale-95 transition-all">
                <i class="fa-solid fa-plus text-xs"></i>
                เพิ่มรายการ
            </button>
        </div>

        <!-- Items List -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-xs font-bold text-[#A69680] uppercase tracking-widest">รายการใช้จ่าย</h3>
                <span id="itemCount" class="text-[10px] bg-[#F2EDE4] text-[#8C7E6D] px-2 py-0.5 rounded-full font-bold">0 รายการ</span>
            </div>
            <div id="itemsContainer" class="space-y-3">
                <!-- Items will be injected here -->
            </div>
        </div>

        <!-- People Selector -->
        <div class="bg-[#F2EDE4]/40 p-6 rounded-[2.5rem] border border-white/50 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#4A90E2] shadow-sm">
                    <i class="fa-solid fa-users text-sm"></i>
                </div>
                <span class="font-bold text-[#8C7E6D] text-sm">จำนวนคนหาร</span>
            </div>
            <div class="flex items-center gap-5">
                <button onclick="updatePeople(-1)" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-[#A69680] shadow-sm active:scale-90 transition-transform">
                    <i class="fa-solid fa-minus text-xs"></i>
                </button>
                <span id="numPeopleText" class="text-2xl font-black text-[#5D544B] w-6 text-center">2</span>
                <button onclick="updatePeople(1)" class="w-10 h-10 gradient-accent rounded-full flex items-center justify-center text-white shadow-md active:scale-90 transition-transform">
                    <i class="fa-solid fa-plus text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="fixed bottom-6 left-6 right-6 max-w-md mx-auto flex gap-3">
        <button onclick="copyToClipboard()" class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center text-[#A69680] shadow-xl border border-white transition-all active:scale-90" title="คัดลอกสรุป">
            <i id="copyIcon" class="fa-solid fa-copy text-xl"></i>
        </button>
        <button onclick="shareSummary()" class="flex-1 h-16 gradient-accent rounded-3xl text-white font-bold flex items-center justify-center gap-3 shadow-xl shadow-blue-200 active:scale-95 transition-all">
            <i class="fa-solid fa-share-nodes"></i>
            ส่งสรุปยอดให้เพื่อน
        </button>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl opacity-0 transition-all pointer-events-none z-50">
        คัดลอกลงคลิปบอร์ดแล้ว ✨
    </div>

    <script>
        let items = [
            { id: 1, name: 'ข้าว', price: 50 },
            { id: 2, name: 'แกง', price: 40 },
            { id: 3, name: 'น้ำ', price: 10 }
        ];
        let numPeople = 2;

        // Initialize App
        window.onload = () => {
            renderItems();
            calculate();
            
            // Set App Icon from User Upload (Mock for UI)
            const iconUrl = 'uploaded:image.png-1ffccff5-6fa7-471e-9b8d-0175e373ccf4'; // Using the user's uploaded icon ID if supported
            if (iconUrl.startsWith('uploaded:')) {
                // In some environments we need to keep the placeholder or try to load
                // But we'll try to apply a gradient as fallback
                document.getElementById('appIcon').style.background = 'linear-gradient(135deg, #64D2B7, #4A90E2)';
            }
        };

        function addItem() {
            const nameInput = document.getElementById('itemName');
            const priceInput = document.getElementById('itemPrice');
            
            if (nameInput.value.trim() && priceInput.value) {
                items.push({
                    id: Date.now(),
                    name: nameInput.value.trim(),
                    price: parseFloat(priceInput.value)
                });
                
                nameInput.value = '';
                priceInput.value = '';
                
                renderItems();
                calculate();
            }
        }

        function removeItem(id) {
            items = items.filter(it => it.id !== id);
            renderItems();
            calculate();
        }

        function updatePeople(val) {
            numPeople = Math.max(1, numPeople + val);
            document.getElementById('numPeopleText').innerText = numPeople;
            calculate();
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer');
            const countText = document.getElementById('itemCount');
            
            countText.innerText = `${items.length} รายการ`;
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 bg-white/30 rounded-[2rem] border border-dashed border-[#D1C8BC]">
                        <p class="text-sm text-[#A69680]">ยังไม่มีรายการค่าใช้จ่าย</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="item-row bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-[#F2EDE4] hover:border-[#4A90E2]/30 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full gradient-accent"></div>
                        <span class="font-bold text-[#5D544B]">${item.name}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-[#8C7E6D]">฿${item.price.toLocaleString()}</span>
                        <button onclick="removeItem(${item.id})" class="text-[#D1C8BC] hover:text-red-400 p-1">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function calculate() {
            const total = items.reduce((sum, it) => sum + it.price, 0);
            const perPerson = total / numPeople;
            
            const mainPart = Math.floor(perPerson).toLocaleString();
            const decimalPart = (perPerson % 1).toFixed(2).substring(1);

            document.getElementById('perPersonDisplay').innerText = mainPart;
            document.getElementById('decimalDisplay').innerText = decimalPart;
            document.getElementById('totalDisplay').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('peopleDisplay').innerText = `${numPeople} คน`;
        }

        function resetApp() {
            if(confirm("ล้างข้อมูลทั้งหมดหรือไม่?")) {
                items = [];
                numPeople = 2;
                document.getElementById('numPeopleText').innerText = numPeople;
                renderItems();
                calculate();
            }
        }

        function getSummaryText() {
            const total = items.reduce((sum, it) => sum + it.price, 0);
            const perPerson = total / numPeople;
            const itemList = items.map(it => `• ${it.name}: ฿${it.price.toLocaleString()}`).join('\n');
            
            return `💸 สรุปยอดหาร FairShare\n\n${itemList}\n\n━━━━━━━━━━━━━━━\n💰 ยอดรวม: ฿${total.toLocaleString()}\n👥 จำนวนคน: ${numPeople} ท่าน\n✅ จ่ายคนละ: ฿${perPerson.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}\n━━━━━━━━━━━━━━━`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2000);
        }

        function copyToClipboard() {
            const text = getSummaryText();
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const icon = document.getElementById('copyIcon');
            icon.className = "fa-solid fa-check text-emerald-500";
            showToast("คัดลอกลงคลิปบอร์ดแล้ว ✨");
            
            setTimeout(() => {
                icon.className = "fa-solid fa-copy text-xl";
            }, 2000);
        }

        function shareSummary() {
            if (navigator.share) {
                navigator.share({
                    title: 'FairShare Summary',
                    text: getSummaryText(),
                }).catch(() => copyToClipboard());
            } else {
                copyToClipboard();
            }
        }

        // Service Worker Registration for PWA Feel
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { scope: './' }).catch(err => {
                    // Ignore service worker errors in preview env
                });
            });
        }
    </script>
</body>
</html>
