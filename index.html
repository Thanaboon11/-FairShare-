<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FairShare</title>

    <meta name="apple-mobile-web-app-title" content="FairShare">
    <link rel="apple-touch-icon" href="1.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Anuphan', sans-serif;
            background-color: #F9F6F1;
            color: #5D544B;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        /* ตกแต่ง Card */
        .card-base {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 10px 30px -5px rgba(93, 84, 75, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .inner-stats {
            background-color: #F9F6F1;
            border-radius: 1.25rem;
            border: 1px solid #F2EDE4;
        }

        /* ตกแต่ง Input */
        input {
            background-color: #F2EDE4 !important;
            border: none !important;
            border-radius: 1rem !important;
            padding: 12px 16px !important;
            font-size: 14px !important;
            outline: none !important;
            color: #5D544B !important;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        input::placeholder { color: #CDC1B1; }

        /* ปุ่มกด */
        .btn-gradient {
            background: linear-gradient(135deg, #64D2B7 0%, #4A90E2 100%);
            color: white;
            border-radius: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 8px 20px -5px rgba(74, 144, 226, 0.3);
        }

        .btn-gradient:active { transform: scale(0.96); opacity: 0.9; }

        .btn-circle {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* รายการค่าใช้จ่าย */
        .list-row {
            background: white;
            border-radius: 1.25rem;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(93, 84, 75, 0.02);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-container {
            max-width: 420px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 10rem 1.5rem;
        }

        .bottom-actions {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 3rem);
            max-width: 380px;
            display: flex;
            gap: 0.75rem;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl shadow-sm overflow-hidden border border-white">
                    <img src="1.png" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-none text-[#5D544B]">FairShare</h1>
                    <p class="text-[9px] font-bold text-[#A69680] uppercase tracking-[0.2em] mt-1">PWA EDITION</p>
                </div>
            </div>
            <button onclick="resetApp()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-red-200 shadow-sm active:text-red-400 active:scale-90 transition-all">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
        </div>

        <!-- จอแสดงผลยอดหาร -->
        <div class="card-base p-10 mb-8 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-24 h-24 bg-[#4A90E2] opacity-[0.03] rounded-full"></div>
            
            <p class="text-[10px] font-bold text-[#A69680] uppercase tracking-widest mb-3">จ่ายคนละ</p>
            <div class="flex justify-center items-baseline mb-8">
                <span class="text-2xl font-bold text-[#4A90E2] mr-1">฿</span>
                <span id="perPersonDisplay" class="text-7xl font-black tracking-tighter">0</span>
                <span id="decimalDisplay" class="text-2xl font-bold text-[#D1C8BC]">.00</span>
            </div>
            
            <div class="inline-flex items-center inner-stats px-6 py-3 gap-6">
                <div class="text-left">
                    <p class="text-[8px] font-bold text-[#A69680] uppercase mb-0.5">ยอดรวม</p>
                    <p id="totalDisplay" class="text-sm font-bold">฿0</p>
                </div>
                <div class="w-[1px] h-6 bg-[#E8DCC4]"></div>
                <div class="text-left">
                    <p class="text-[8px] font-bold text-[#A69680] uppercase mb-0.5">จำนวนคน</p>
                    <p id="peopleDisplay" class="text-sm font-bold">2 คน</p>
                </div>
            </div>
        </div>

        <!-- ฟอร์มเพิ่มรายการ -->
        <div class="card-base p-6 mb-8">
            <div class="grid grid-cols-3 gap-3 mb-4">
                <div class="col-span-2">
                    <p class="text-[9px] font-bold text-[#A69680] mb-2 ml-1 uppercase">ชื่อรายการ</p>
                    <input type="text" id="itemName" placeholder="เช่น ค่าข้าว" class="w-full">
                </div>
                <div class="col-span-1">
                    <p class="text-[9px] font-bold text-[#A69680] mb-2 ml-1 uppercase">ราคา</p>
                    <input type="number" id="itemPrice" placeholder="0" class="w-full">
                </div>
            </div>
            <button onclick="addItem()" class="w-full btn-gradient py-4 flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus text-[10px]"></i> เพิ่มรายการ
            </button>
        </div>

        <!-- รายการค่าใช้จ่าย -->
        <div class="mb-10">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-[10px] font-bold text-[#A69680] uppercase tracking-widest">รายการใช้จ่าย</h3>
                <span id="itemCount" class="text-[9px] bg-[#F2EDE4] text-[#8C7E6D] px-2 py-0.5 rounded-full font-bold">0 รายการ</span>
            </div>
            <div id="itemsContainer">
                <!-- รายการจะปรากฏที่นี่ -->
            </div>
        </div>

        <!-- ตัวเลือกจำนวนคน -->
        <div class="bg-[#F2EDE4]/50 p-4 rounded-[2rem] flex items-center justify-between border border-white/40">
            <div class="flex items-center gap-3 ml-2">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-[#4A90E2] shadow-sm">
                    <i class="fa-solid fa-users text-sm"></i>
                </div>
                <span class="font-bold text-[#8C7E6D] text-xs">จำนวนคนหาร</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="updatePeople(-1)" class="btn-circle text-[#A69680] active:scale-90 transition-all">
                    <i class="fa-solid fa-minus text-[10px]"></i>
                </button>
                <span id="numPeopleText" class="text-2xl font-black w-6 text-center">2</span>
                <button onclick="updatePeople(1)" class="btn-circle btn-gradient active:scale-90 transition-all">
                    <i class="fa-solid fa-plus text-[10px]"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ปุ่มด้านล่าง -->
    <div class="bottom-actions">
        <button onclick="copyToClipboard()" class="w-16 h-16 bg-white rounded-[1.5rem] flex items-center justify-center text-[#A69680] shadow-xl border border-white active:scale-90 transition-transform">
            <i class="fa-solid fa-copy text-xl"></i>
        </button>
        <button onclick="shareSummary()" class="flex-1 btn-gradient rounded-[1.5rem] flex items-center justify-center gap-3 shadow-xl">
            <i class="fa-solid fa-share-nodes"></i>
            ส่งสรุปยอดให้เพื่อน
        </button>
    </div>

    <script>
        let items = [];
        let numPeople = 2;

        function addItem() {
            const nameEl = document.getElementById('itemName');
            const priceEl = document.getElementById('itemPrice');
            
            if (nameEl.value.trim() !== "" && priceEl.value !== "") {
                items.push({
                    id: Date.now(),
                    name: nameEl.value.trim(),
                    price: parseFloat(priceEl.value)
                });
                nameEl.value = '';
                priceEl.value = '';
                render();
            }
        }

        function removeItem(id) {
            items = items.filter(it => it.id !== id);
            render();
        }

        function updatePeople(val) {
            numPeople = Math.max(1, numPeople + val);
            document.getElementById('numPeopleText').innerText = numPeople;
            render();
        }

        function render() {
            const container = document.getElementById('itemsContainer');
            const total = items.reduce((sum, it) => sum + it.price, 0);
            const perPerson = total / numPeople;

            document.getElementById('itemCount').innerText = `${items.length} รายการ`;
            document.getElementById('perPersonDisplay').innerText = Math.floor(perPerson).toLocaleString();
            document.getElementById('decimalDisplay').innerText = (perPerson % 1).toFixed(2).substring(1);
            document.getElementById('totalDisplay').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('peopleDisplay').innerText = `${numPeople} คน`;

            if (items.length === 0) {
                container.innerHTML = '<p class="text-center py-8 text-[#A69680] text-xs opacity-50">ยังไม่มีรายการ</p>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="list-row">
                    <div class="flex items-center gap-3">
                        <div class="w-1.5 h-1.5 rounded-full bg-[#4A90E2]"></div>
                        <span class="font-bold text-sm text-[#5D544B]">${item.name}</span>
                    </div>
                    <div class="flex items-center gap-5">
                        <span class="font-bold text-[#8C7E6D] text-sm">฿${item.price.toLocaleString()}</span>
                        <button onclick="removeItem(${item.id})" class="text-[#D1C8BC] hover:text-red-400 p-1 transition-colors">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function resetApp() {
            if(confirm("ล้างข้อมูลทั้งหมด?")) {
                items = [];
                numPeople = 2;
                document.getElementById('numPeopleText').innerText = 2;
                render();
            }
        }

        function copyToClipboard() {
            const total = items.reduce((s, i) => s + i.price, 0);
            const per = total / numPeople;
            const text = `💸 FairShare Summary\nยอดรวม: ฿${total.toLocaleString()}\nคนหาร: ${numPeople} ท่าน\nจ่ายคนละ: ฿${per.toLocaleString(undefined, {minimumFractionDigits: 2})}\nขอบคุณครับ ✨`;
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            alert("คัดลอกสรุปแล้ว ✨");
        }

        function shareSummary() {
            if (navigator.share) {
                const total = items.reduce((s, i) => s + i.price, 0);
                const per = total / numPeople;
                navigator.share({ 
                    title: 'FairShare', 
                    text: `สรุปยอดหารเงิน\nยอดรวม: ฿${total.toLocaleString()}\nคนหาร: ${numPeople} ท่าน\nจ่ายคนละ: ฿${per.toLocaleString(undefined, {minimumFractionDigits: 2})}`
                }).catch(() => {});
            } else {
                copyToClipboard();
            }
        }

        // เริ่มต้นแอป
        render();
    </script>
</body>
</html>
